<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Cosmic Clock</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

#info{
    position:fixed;
    top:0;
    width:100%;
    text-align:center;
    padding:8px;
    background:rgba(0,0,0,0.6);
    font-size:13px;
}

@media(min-width:768px){
    #info{font-size:16px;}
}

canvas{display:block;}
</style>
</head>
<body>

<div id="info">
<div id="datetime"></div>
<div id="dayCounter"></div>
<div>
Sun → Milky Way: 225 million years (scaled)<br>
Earth → Sun: 365 days (scaled)<br>
Moon → Earth: 27.3 days (scaled)<br>
Earth Rotation: 24 hours
</div>
</div>

<canvas id="space"></canvas>

<script>
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let zoom = 1;

// Mouse wheel zoom (PC)
window.addEventListener("wheel", e=>{
    zoom += e.deltaY * -0.001;
    zoom = Math.min(Math.max(.5, zoom), 3);
});

// Touch pinch zoom (Mobile)
let lastDist = null;
window.addEventListener("touchmove", e=>{
    if(e.touches.length===2){
        let dx = e.touches[0].clientX - e.touches[1].clientX;
        let dy = e.touches[0].clientY - e.touches[1].clientY;
        let dist = Math.sqrt(dx*dx+dy*dy);

        if(lastDist){
            zoom += (dist-lastDist)*0.005;
            zoom = Math.min(Math.max(.5, zoom),3);
        }
        lastDist = dist;
    }
});
window.addEventListener("touchend",()=>lastDist=null);

// Permanent Day 1
if(!localStorage.getItem("startDate")){
    localStorage.setItem("startDate", new Date().toISOString());
}
const startDate = new Date(localStorage.getItem("startDate"));

function updateTime(){
    const now = new Date();
    document.getElementById("datetime").innerHTML =
        now.toDateString()+" | "+now.toLocaleTimeString();

    const diff = Math.floor((now-startDate)/(1000*60*60*24))+1;
    document.getElementById("dayCounter").innerHTML =
        "Day "+diff+" (since "+startDate.toDateString()+")";
}
setInterval(updateTime,1000);
updateTime();

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const centerX = canvas.width/2;
    const centerY = canvas.height/2;
    const scale = zoom * Math.min(canvas.width,canvas.height)/800;

    const galaxyOrbit = 260*scale;
    const earthOrbit = 120*scale;
    const moonOrbit = 30*scale;

    const now = new Date();
    const seconds = now.getTime()/1000;

    // VERY slow galaxy rotation (scaled)
    const sunAngle = seconds*(2*Math.PI/600); // slow

    const sunX = centerX + galaxyOrbit*Math.cos(sunAngle);
    const sunY = centerY + galaxyOrbit*Math.sin(sunAngle);

    // Milky Way center
    ctx.beginPath();
    ctx.arc(centerX,centerY,6*scale,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();

    // Sun
    ctx.beginPath();
    ctx.arc(sunX,sunY,18*scale,0,Math.PI*2);
    ctx.fillStyle="orange";
    ctx.fill();

    // Earth orbit (365 days scaled to 60 sec)
    const earthAngle = seconds*(2*Math.PI/60);
    const earthX = sunX + earthOrbit*Math.cos(earthAngle);
    const earthY = sunY + earthOrbit*Math.sin(earthAngle);

    ctx.beginPath();
    ctx.arc(earthX,earthY,8*scale,0,Math.PI*2);
    ctx.fillStyle="blue";
    ctx.fill();

    // Earth rotation (24h scaled to 10 sec)
    const earthSpin = seconds*(2*Math.PI/10);
    ctx.beginPath();
    ctx.moveTo(earthX,earthY);
    ctx.lineTo(
        earthX + 12*scale*Math.cos(earthSpin),
        earthY + 12*scale*Math.sin(earthSpin)
    );
    ctx.strokeStyle="white";
    ctx.stroke();

    // Moon orbit
    const moonAngle = seconds*(2*Math.PI/20);
    const moonX = earthX + moonOrbit*Math.cos(moonAngle);
    const moonY = earthY + moonOrbit*Math.sin(moonAngle);

    ctx.beginPath();
    ctx.arc(moonX,moonY,4*scale,0,Math.PI*2);
    ctx.fillStyle="gray";
    ctx.fill();

    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
